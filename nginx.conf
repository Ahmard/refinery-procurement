server {
    server_name proc.ahmard.com;

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Scheme $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        error_log /var/log/nginx/proc.ahmard.com-ui-error.log;

        proxy_pass http://127.0.0.1:9090/;
    }

    location /auth/ {
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Scheme $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        error_log /var/log/nginx/proc.ahmard.com-auth-error.log;

        proxy_pass http://127.0.0.1:9091/;
    }

    location /admin/ {
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Scheme $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        error_log /var/log/nginx/proc.ahmard.com-admin-error.log;

        proxy_pass http://127.0.0.1:9092/;
    }

    location /catalog/ {
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Scheme $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        error_log /var/log/nginx/proc.ahmard.com-catalog-error.log;

        proxy_pass http://127.0.0.1:9093/;
    }

    location /procurement/ {
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Scheme $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        error_log /var/log/nginx/proc.ahmard.com-procurement-error.log;

        proxy_pass http://127.0.0.1:9094/;
    }
}
