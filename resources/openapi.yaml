openapi: 3.0.0
info:
  title: Refinery Procurement System API
  description: API for managing refinery equipment catalog and procurement orders.
  version: 1.0.0
servers:
  - url: http://localhost:8080/api/v1
    description: Local development server
paths:
  /catalog/items:
    get:
      summary: Search catalog items
      description: Retrieve a paginated list of catalog items based on filters.
      parameters:
        - in: query
          name: category
          schema:
            type: string
            enum: [Valve, Pump, Gasket, Instrumentation, HeatExchanger, Tool, Other]
          description: Filter by item category
        - in: query
          name: supplier_id
          schema:
            type: string
            format: uuid
          description: Filter by supplier ID
        - in: query
          name: in_stock
          schema:
            type: boolean
          description: Filter by stock availability
        - in: query
          name: search_term
          schema:
            type: string
          description: Search by item name (partial match)
        - in: query
          name: page
          schema:
            type: integer
            default: 1
          description: Page number
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
          description: Items per page
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CatalogItemResponse'
  /catalog/items/{id}:
    get:
      summary: Get item details
      description: Retrieve detailed information for a specific catalog item.
      parameters:
        - in: path
          name: id
          schema:
            type: string
          required: true
          description: Catalog item UUID or secondary ID
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogItemResponse'
        '404':
          description: Item not found
  /catalog/items/{id}/compatible:
    get:
      summary: Get compatible items
      description: Retrieve a list of items compatible with the specified item.
      parameters:
        - in: path
          name: id
          schema:
            type: string
            format: uuid
          required: true
          description: Catalog item UUID
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CatalogItemResponse'
  /purchase-orders:
    post:
      summary: Create draft purchase order
      description: Create a new draft purchase order.
      parameters:
        - in: header
          name: Idempotency-Key
          schema:
            type: string
          required: false
          description: Unique key to prevent duplicate orders
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PurchaseOrderCreateRequest'
      responses:
        '201':
          description: Order created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PurchaseOrderResponse'
        '409':
          description: Conflict (e.g., supplier mismatch)
  /purchase-orders/{id}:
    get:
      summary: Get purchase order details
      description: Retrieve detailed information for a specific purchase order.
      parameters:
        - in: path
          name: id
          schema:
            type: string
            format: uuid
          required: true
          description: Purchase order UUID
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PurchaseOrderResponse'
        '404':
          description: Order not found
  /purchase-orders/{id}/items:
    post:
      summary: Add item to order
      description: Add a catalog item to a draft purchase order.
      parameters:
        - in: path
          name: id
          schema:
            type: string
            format: uuid
          required: true
          description: Purchase order UUID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PurchaseOrderItemRequest'
      responses:
        '200':
          description: Item added successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PurchaseOrderResponse'
        '400':
          description: Invalid request (e.g., order not in DRAFT status)
        '409':
          description: Conflict (e.g., item supplier mismatch)
  /purchase-orders/{id}/submit:
    post:
      summary: Submit purchase order
      description: Submit a draft purchase order for approval.
      parameters:
        - in: path
          name: id
          schema:
            type: string
            format: uuid
          required: true
          description: Purchase order UUID
      responses:
        '200':
          description: Order submitted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PurchaseOrderResponse'
        '400':
          description: Invalid request (e.g., order not in DRAFT status, no items)
  /admin/audit:
    get:
      summary: Get all audit logs
      description: Retrieve a list of all audit logs.
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AuditLogResponse'
  /admin/audit/user/{id}:
    get:
      summary: Get audit logs by user
      description: Retrieve audit logs for a specific user.
      parameters:
        - in: path
          name: id
          schema:
            type: string
            format: uuid
          required: true
          description: User UUID
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AuditLogResponse'
  /admin/audit/target:
    get:
      summary: Get audit logs by target
      description: Retrieve audit logs for a specific target entity.
      parameters:
        - in: query
          name: entity
          schema:
            type: string
          required: true
          description: Target entity type (e.g., "purchase_order")
        - in: query
          name: id
          schema:
            type: string
          required: true
          description: Target entity ID
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AuditLogResponse'
components:
  schemas:
    CatalogItemResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        secondary_id:
          type: string
        name:
          type: string
        category:
          type: string
        supplier_id:
          type: string
          format: uuid
        supplier_name:
          type: string
        manufacturer:
          type: string
          nullable: true
        model:
          type: string
          nullable: true
        price_usd:
          type: number
        lead_time_days:
          type: integer
          nullable: true
        in_stock:
          type: boolean
          nullable: true
        specs:
          type: object
          additionalProperties: true
    PurchaseOrderCreateRequest:
      type: object
      required:
        - supplier_id
        - requestor
      properties:
        supplier_id:
          type: string
          format: uuid
        requestor:
          type: string
        cost_center:
          type: string
          nullable: true
        payment_terms:
          type: string
          nullable: true
        needed_by_date:
          type: string
          format: date
          nullable: true
    PurchaseOrderItemRequest:
      type: object
      required:
        - item_id
        - quantity
      properties:
        item_id:
          type: string
          description: Catalog item secondary ID
        quantity:
          type: integer
          minimum: 1
    PurchaseOrderResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        po_number:
          type: string
        supplier_id:
          type: string
          format: uuid
        supplier_name:
          type: string
        status:
          type: string
          enum: [Draft, Submitted, Approved, Rejected, Cancelled, Fulfilled]
        items:
          type: array
          items:
            $ref: '#/components/schemas/PurchaseOrderItemResponse'
        total_amount:
          type: number
        created_at:
          type: string
          format: date-time
        submitted_at:
          type: string
          format: date-time
          nullable: true
        status_history:
          type: array
          items:
            $ref: '#/components/schemas/StatusHistoryEntry'
    PurchaseOrderItemResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        catalog_item_id:
          type: string
        item_name:
          type: string
        quantity:
          type: integer
        unit_price:
          type: number
        total_price:
          type: number
        snapshot_lead_time:
          type: integer
          nullable: true
    StatusHistoryEntry:
      type: object
      properties:
        status:
          type: string
        created_at:
          type: string
          format: date-time
        created_by:
          type: string
          format: uuid
    AuditLogResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        user_id:
          type: string
          format: uuid
        action:
          type: string
        target_entity:
          type: string
        target_id:
          type: string
        changes:
          type: object
          nullable: true
        created_at:
          type: string
          format: date-time
